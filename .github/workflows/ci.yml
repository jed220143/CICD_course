name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: python -m pip install -e "api[dev]"

      - name: Run API tests
        working-directory: api
        run: python -m pytest

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t mini-telemetry-api:ci api

      - name: Build simulator image
        run: docker build -t mini-telemetry-simulator:ci simulator
