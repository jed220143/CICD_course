services:
  broker:
    image: eclipse-mosquitto:2
    container_name: mini-telemetry-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - telemetry_net

  db:
    image: postgres:16-alpine
    container_name: mini-telemetry-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - telemetry_net

  api:
    build:
      context: ../../api
    image: mini-telemetry-api:dev
    container_name: mini-telemetry-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://telemetry:telemetry_dev_password@db:5432/telemetry
      LOG_LEVEL: INFO
      MQTT_BROKER_HOST: broker
      MQTT_BROKER_PORT: 1883
      MQTT_TOPIC: devices/+/telemetry
    ports:
      - "8001:8000"
    depends_on:
      broker:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - telemetry_net

  simulator:
    build:
      context: ../../simulator
    image: mini-telemetry-simulator:dev
    container_name: mini-telemetry-simulator
    restart: unless-stopped
    environment:
      MQTT_BROKER_HOST: broker
      MQTT_BROKER_PORT: 1883
      MQTT_PUBLISH_TOPIC: devices/sensor-001/telemetry
      DEVICE_KEY: sensor-001
      SIMULATOR_INTERVAL_SECONDS: 5
      SIMULATOR_OUTPUT_DIR: /app/out
    volumes:
      - ../../local-artifacts/simulator:/app/out
    depends_on:
      broker:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - telemetry_net

  nginx:
    image: nginx:1.27-alpine
    container_name: mini-telemetry-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - telemetry_net

networks:
  telemetry_net:

volumes:
  postgres_data:
