services:
  db:
    image: postgres:16-alpine
    container_name: mini-telemetry-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - telemetry_net

  api:
    build:
      context: ../../api
    image: mini-telemetry-api:dev
    container_name: mini-telemetry-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://telemetry:telemetry_dev_password@db:5432/telemetry
      LOG_LEVEL: INFO
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - telemetry_net

networks:
  telemetry_net:

volumes:
  postgres_data:
